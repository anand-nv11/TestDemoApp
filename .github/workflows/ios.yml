name: iOS Appium Automation - CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  appium-ios:
    runs-on: macos-15

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver list --installed

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d
          find . -name "pom.xml"

      - name: Show Simulators
        run: |
          xcrun simctl list devices available

      - name: Build iOS App
        run: |
          xcodebuild \
            -scheme SwiftUIDemoAllComponents \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            clean build

      - name: Create Report Folders
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots

      - name: Start Appium Server
        run: |
          nohup appium > appium.log 2>&1 &
          sleep 20

      - name: Run Appium Tests
        run: |
          cd AppiumTests
          mvn clean test

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
