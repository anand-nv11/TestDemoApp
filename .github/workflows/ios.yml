name: iOS Appium Automation - CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_failure_demo:
        description: "Run intentional LoginFailureDemoTest"
        required: false
        default: false
        type: boolean

jobs:
  appium-ios:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PLATFORM_VERSION: "26.4"
      PREFERRED_DEVICE_NAME: "iPhone 17"
      BUNDLE_ID: "test.com.SwiftUIDemoAllComponents"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "/Applications/Xcode_26.4.1.app/Contents/Developer" ]; then
            sudo xcode-select -s "/Applications/Xcode_26.4.1.app/Contents/Developer"
          else
            echo "Xcode 26.4.1 not found. Using default Xcode."
            sudo xcode-select -s "/Applications/Xcode.app/Contents/Developer"
          fi

          xcode-select -p
          xcodebuild -version

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: AppiumTests/pom.xml

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium and XCUITest Driver
        shell: bash
        run: |
          set -euo pipefail

          npm install --global appium@3.5.2
          appium --version
          appium driver install xcuitest
          appium driver list --installed
          appium driver doctor xcuitest || true

      - name: Show Available Simulators
        shell: bash
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devicetypes
          xcrun simctl list devices available

      - name: Select and Boot iOS Simulator
        shell: bash
        run: |
          set -euo pipefail

          DEVICE_ID=$(xcrun simctl list devices available |
            sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
            grep "$PREFERRED_DEVICE_NAME (" |
            head -1 |
            sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/' || true)

          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl list devices available |
              sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
              grep "iPhone" |
              head -1 |
              sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/' || true)
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "ERROR: No iOS $PLATFORM_VERSION iPhone simulator was found."
            xcrun simctl list devices available
            exit 1
          fi

          DEVICE_NAME=$(xcrun simctl list devices available |
            grep "$DEVICE_ID" |
            sed -E 's/^[[:space:]]*([^()]+).*/\1/' |
            xargs)

          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

          echo "Selected simulator: $DEVICE_NAME ($DEVICE_ID)"

          killall Simulator 2>/dev/null || true
          xcrun simctl shutdown all || true
          xcrun simctl erase "$DEVICE_ID" || true

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "Waiting for SpringBoard..."
          for attempt in $(seq 1 60); do
            if xcrun simctl spawn "$DEVICE_ID" launchctl print system/com.apple.SpringBoard \
              >/dev/null 2>&1; then
              echo "SpringBoard is ready."
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "ERROR: SpringBoard did not become ready."
              xcrun simctl diagnose || true
              exit 1
            fi

            sleep 2
          done

          xcrun simctl list devices | grep "$DEVICE_ID"

      - name: Build iOS App
        shell: bash
        run: |
          set -o pipefail

          rm -rf "$GITHUB_WORKSPACE/build"

          xcodebuild \
            -scheme "SwiftUIDemoAllComponents" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$GITHUB_WORKSPACE/build" \
            clean build | tee "$GITHUB_WORKSPACE/xcodebuild.log"

          find "$GITHUB_WORKSPACE/build/Build/Products" -type d -name "*.app" -print

      - name: Find SwiftUI Application
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(find "$GITHUB_WORKSPACE/build/Build/Products" \
            -type d \
            -path "*Debug-iphonesimulator*" \
            -name "SwiftUIDemoAllComponents.app" |
            head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: SwiftUIDemoAllComponents.app was not found."
            find "$GITHUB_WORKSPACE/build" -type d -name "*.app" -print || true
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Install App on Simulator
        shell: bash
        run: |
          set -euo pipefail

          xcrun simctl bootstatus "$DEVICE_ID" -b
          xcrun simctl terminate "$DEVICE_ID" "$BUNDLE_ID" 2>/dev/null || true
          xcrun simctl uninstall "$DEVICE_ID" "$BUNDLE_ID" 2>/dev/null || true
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          echo "Installed app container:"
          xcrun simctl get_app_container "$DEVICE_ID" "$BUNDLE_ID"

          echo "Launching app once for validation..."
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          sleep 8
          xcrun simctl terminate "$DEVICE_ID" "$BUNDLE_ID" || true

      - name: Revalidate Simulator Before XCTest
        shell: bash
        run: |
          set -euo pipefail

          echo "Current simulator ID: ${DEVICE_ID:-not-set}"
          echo "Current simulator name: ${DEVICE_NAME:-not-set}"

          DEVICE_AVAILABLE=false

          if [ -n "${DEVICE_ID:-}" ] && \
             xcrun simctl list devices available | grep -q "$DEVICE_ID"; then
            DEVICE_AVAILABLE=true
          fi

          if [ "$DEVICE_AVAILABLE" != "true" ]; then
            echo "Previously selected simulator is no longer available."
            echo "Selecting a replacement simulator for iOS $PLATFORM_VERSION."

            DEVICE_ID=$(xcrun simctl list devices available |
              sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
              grep "$PREFERRED_DEVICE_NAME (" |
              head -1 |
              sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/' || true)

            if [ -z "$DEVICE_ID" ]; then
              DEVICE_ID=$(xcrun simctl list devices available |
                sed -n "/-- iOS $PLATFORM_VERSION --/,/-- iOS/p" |
                grep "iPhone" |
                head -1 |
                sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/' || true)
            fi

            if [ -z "$DEVICE_ID" ]; then
              echo "ERROR: No replacement iPhone simulator was found."
              xcrun simctl list devices available
              exit 1
            fi

            DEVICE_NAME=$(xcrun simctl list devices available |
              grep "$DEVICE_ID" |
              sed -E 's/^[[:space:]]*([^()]+).*/\1/' |
              xargs)

            echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
            echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          fi

          DEVICE_STATE=$(xcrun simctl list devices | grep "$DEVICE_ID" || true)
          echo "Simulator state before XCTest: $DEVICE_STATE"

          if ! echo "$DEVICE_STATE" | grep -q "Booted"; then
            echo "Booting simulator before XCTest..."
            xcrun simctl boot "$DEVICE_ID" || true
          fi

          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "Final simulator state:"
          xcrun simctl list devices | grep "$DEVICE_ID"

      - name: Ensure App Is Installed Before XCTest
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APP_PATH:-}" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: APP_PATH is missing or invalid."
            exit 1
          fi

          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          echo "Installed app container:"
          xcrun simctl get_app_container "$DEVICE_ID" "$BUNDLE_ID"

      - name: Warm Up Simulator Before XCTest
        shell: bash
        run: |
          set -euo pipefail

          echo "===== SIMULATOR WARM-UP ====="
          xcrun simctl list devices | grep "$DEVICE_ID"

          SPRINGBOARD_READY=false

          for attempt in $(seq 1 60); do
            if xcrun simctl spawn "$DEVICE_ID" launchctl print system/com.apple.SpringBoard \
              > /dev/null 2>&1; then
              SPRINGBOARD_READY=true
              echo "SpringBoard is ready."
              break
            fi

            echo "Waiting for SpringBoard: $attempt/60"
            sleep 2
          done

          if [ "$SPRINGBOARD_READY" != "true" ]; then
            echo "ERROR: SpringBoard did not become ready."
            xcrun simctl diagnose || true
            exit 1
          fi

          echo "Launching Settings to warm up simulator UI..."
          xcrun simctl launch "$DEVICE_ID" com.apple.Preferences || true
          sleep 8

          xcrun simctl terminate "$DEVICE_ID" com.apple.Preferences || true
          sleep 3

          echo "Launching target app once before XCTest..."
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID" || true
          sleep 10

          xcrun simctl terminate "$DEVICE_ID" "$BUNDLE_ID" || true
          sleep 3

      - name: Run Native XCTest Suite
        shell: bash
        run: |
          set -o pipefail
          set +e

          echo "===== XCTEST CONFIGURATION ====="
          echo "DEVICE_ID=$DEVICE_ID"
          echo "DEVICE_NAME=$DEVICE_NAME"
          echo "PLATFORM_VERSION=$PLATFORM_VERSION"

          xcrun simctl list devices | grep "$DEVICE_ID"

          rm -rf "$GITHUB_WORKSPACE/SwiftUIDemoAllComponentsTests.xcresult"

          xcodebuild test \
            -scheme "SwiftUIDemoAllComponents" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -destination-timeout 300 \
            -derivedDataPath "$GITHUB_WORKSPACE/build-xctest" \
            -resultBundlePath "$GITHUB_WORKSPACE/SwiftUIDemoAllComponentsTests.xcresult" \
            -parallel-testing-enabled NO \
            -maximum-parallel-testing-workers 1 \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 600 | \
            tee "$GITHUB_WORKSPACE/xctest.log"

          XCTEST_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$XCTEST_EXIT_CODE" -ne 0 ] && \
             grep -q "Timed out waiting for AX loaded notification" \
               "$GITHUB_WORKSPACE/xctest.log"; then

            echo "AX initialization timeout detected. Retrying once..."

            xcrun simctl shutdown "$DEVICE_ID" || true
            sleep 5
            xcrun simctl boot "$DEVICE_ID"
            xcrun simctl bootstatus "$DEVICE_ID" -b
            sleep 15

            xcrun simctl install "$DEVICE_ID" "$APP_PATH"

            rm -rf "$GITHUB_WORKSPACE/SwiftUIDemoAllComponentsTests.xcresult"

            xcodebuild test \
              -scheme "SwiftUIDemoAllComponents" \
              -configuration Debug \
              -destination "platform=iOS Simulator,id=$DEVICE_ID" \
              -destination-timeout 300 \
              -derivedDataPath "$GITHUB_WORKSPACE/build-xctest" \
              -resultBundlePath "$GITHUB_WORKSPACE/SwiftUIDemoAllComponentsTests.xcresult" \
              -parallel-testing-enabled NO \
              -maximum-parallel-testing-workers 1 \
              -test-timeouts-enabled YES \
              -maximum-test-execution-time-allowance 600 | \
              tee -a "$GITHUB_WORKSPACE/xctest.log"

            XCTEST_EXIT_CODE=${PIPESTATUS[0]}
          fi

          exit "$XCTEST_EXIT_CODE"

      - name: Create Report Folders
        shell: bash
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots
          mkdir -p AppiumTests/videos

      - name: Start Simulator Video Recording
        shell: bash
        run: |
          set -euo pipefail

          xcrun simctl io "$DEVICE_ID" recordVideo \
            --codec h264 \
            "$GITHUB_WORKSPACE/AppiumTests/videos/simulator-test.mp4" \
            > "$GITHUB_WORKSPACE/simulator-video.log" 2>&1 &

          echo "VIDEO_PID=$!" >> "$GITHUB_ENV"

      - name: Start and Verify Appium Server
        shell: bash
        run: |
          set -euo pipefail

          pkill -f "appium.*4723" 2>/dev/null || true
          pkill -f "xcodebuild.*WebDriverAgentRunner" 2>/dev/null || true
          sleep 2

          nohup appium \
            --address 127.0.0.1 \
            --port 4723 \
            --base-path / \
            --log-level debug \
            --log-timestamp \
            > "$GITHUB_WORKSPACE/appium.log" 2>&1 &

          echo "APPIUM_PID=$!" >> "$GITHUB_ENV"

          SERVER_READY=false

          for attempt in $(seq 1 60); do
            if curl --silent --fail "http://127.0.0.1:4723/status" \
              > "$GITHUB_WORKSPACE/appium-status.json"; then
              if grep -q '"ready":true' "$GITHUB_WORKSPACE/appium-status.json"; then
                SERVER_READY=true
                cat "$GITHUB_WORKSPACE/appium-status.json"
                break
              fi
            fi

            echo "Waiting for Appium server: $attempt/60"
            sleep 2
          done

          if [ "$SERVER_READY" != "true" ]; then
            echo "ERROR: Appium server did not become ready."
            cat "$GITHUB_WORKSPACE/appium.log" || true
            exit 1
          fi

      - name: Verify Maven Dependencies
        working-directory: AppiumTests
        shell: bash
        run: |
          set -euo pipefail
          java -version
          mvn -version
          mvn dependency:tree -Dincludes=io.appium:java-client,org.seleniumhq.selenium

      - name: Verify TestNG Test Files
        working-directory: AppiumTests
        shell: bash
        run: |
          set -euo pipefail

          find src/test/java -type f -name "*.java" -print
          grep -R "org.testng.annotations.Test" src/test/java || true
          grep -R "@Test" src/test/java || true

          test -f testng.xml
          cat testng.xml

          mvn test-compile
          find target/test-classes -type f -name "*.class" -print

      - name: Run Appium Tests and Print Reports
        working-directory: AppiumTests
        shell: bash
        env:
          RUN_FAILURE_DEMO: ${{ github.event_name == 'workflow_dispatch' && inputs.run_failure_demo || false }}
        run: |
          set +e

          echo "Appium Server: http://127.0.0.1:4723"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Device UDID: $DEVICE_ID"
          echo "Device name: $DEVICE_NAME"
          echo "Platform version: $PLATFORM_VERSION"
          echo "Run failure demo: $RUN_FAILURE_DEMO"

          mvn clean test \
            -DappiumServerUrl="http://127.0.0.1:4723" \
            -DbundleId="$BUNDLE_ID" \
            -Dudid="$DEVICE_ID" \
            -DdeviceName="$DEVICE_NAME" \
            -DplatformVersion="$PLATFORM_VERSION" \
            -DnoReset=false \
            -DuseNewWDA=false \
            -DclearSystemFiles=true \
            -DshowXcodeLog=true \
            -DwdaLaunchTimeout=240000 \
            -DwdaConnectionTimeout=240000 \
            -DwdaStartupRetries=4 \
            -DwdaStartupRetryInterval=20000 \
            -DrunFailureDemo="$RUN_FAILURE_DEMO" \
            -Dsurefire.useFile=false

          TEST_EXIT_CODE=$?

          echo "===== MAVEN EXIT CODE: $TEST_EXIT_CODE ====="
          find target/surefire-reports -type f -print 2>/dev/null || true

          find target/surefire-reports -type f -name "*.txt" \
            -exec sh -c 'echo "----- $1 -----"; cat "$1"' _ {} \; \
            2>/dev/null || true

          find target/surefire-reports -type f -name "*.xml" \
            -exec sh -c 'echo "----- $1 -----"; cat "$1"' _ {} \; \
            2>/dev/null || true

          if [ "$TEST_EXIT_CODE" -ne 0 ]; then
            cat "$GITHUB_WORKSPACE/appium.log" || true
          fi

          exit "$TEST_EXIT_CODE"

      - name: Collect Simulator Diagnostics
        if: failure()
        shell: bash
        run: |
          echo "===== SIMULATOR STATE ====="
          xcrun simctl list devices | grep "${DEVICE_ID:-UNKNOWN}" || true

          echo "===== INSTALLED APP ====="
          xcrun simctl get_app_container "${DEVICE_ID:-booted}" "$BUNDLE_ID" || true

          echo "===== WDA STATUS ====="
          curl --silent --show-error http://127.0.0.1:8100/status || true

          echo "===== APPIUM STATUS ====="
          curl --silent --show-error http://127.0.0.1:4723/status || true

          echo "===== LAST APPIUM LOG LINES ====="
          tail -n 300 "$GITHUB_WORKSPACE/appium.log" || true

      - name: Stop Appium and WDA
        if: always()
        shell: bash
        run: |
          if [ -n "${APPIUM_PID:-}" ]; then
            kill "$APPIUM_PID" 2>/dev/null || true
          fi

          pkill -f "xcodebuild.*WebDriverAgentRunner" 2>/dev/null || true

      - name: Stop Simulator Video Recording
        if: always()
        shell: bash
        run: |
          if [ -n "${VIDEO_PID:-}" ]; then
            kill -INT "$VIDEO_PID" || true
            sleep 5
          fi
          ls -lh AppiumTests/videos || true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: warn

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: AppiumTests/target/surefire-reports
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Simulator Video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-video
          path: AppiumTests/videos
          if-no-files-found: warn

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: warn

      - name: Upload XCTest Result Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-result-bundle
          path: SwiftUIDemoAllComponentsTests.xcresult
          if-no-files-found: warn

      - name: Upload XCTest Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-log
          path: xctest.log
          if-no-files-found: warn

      - name: Upload Xcode Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log
          path: xcodebuild.log
          if-no-files-found: ignore
