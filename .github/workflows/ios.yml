name: iOS Appium Automation - CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  appium-ios:
    runs-on: macos-26

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver list --installed

      - name: Show Simulators
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Build iOS App
        run: |
          xcodebuild \
            -scheme SwiftUIDemoAllComponents \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build

          find build -name "*.app"

      - name: Boot iOS 26.4 iPhone Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk '
            /-- iOS 26.4 --/ {found=1; next}
            /-- iOS/ {found=0}
            found && /iPhone/ && /\(Shutdown\)/ {
              match($0, /\(([A-F0-9-]+)\)/, arr)
              print arr[1]
              exit
            }
          ')

          echo "DEVICE_ID=$DEVICE_ID"

          if [ -z "$DEVICE_ID" ]; then
            echo "No iOS 26.4 iPhone simulator found on this runner"
            exit 1
          fi

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Install App on Simulator
        run: |
          APP_PATH=$(find build -name "SwiftUIDemoAllComponents.app" | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "DEVICE_ID=$DEVICE_ID"

          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" test.com.SwiftUIDemoAllComponents || true

      - name: Create Report Folders
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots

      - name: Start Appium Server
        run: |
          nohup appium --base-path / > appium.log 2>&1 &
          sleep 20
          cat appium.log

      - name: Run Appium Tests
        run: |
          cd AppiumTests
          mvn clean test -DbundleId=test.com.SwiftUIDemoAllComponents

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore
