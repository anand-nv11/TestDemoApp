name: iOS Appium Automation - CI-CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  appium-ios:

    runs-on: macos-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Verify Appium
        run: |
          appium driver list --installed

      - name: Show Simulators
        run: |
          xcrun simctl list devices

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 17" || true
          sleep 30

      - name: Start Appium Server
        run: |
          nohup appium > appium.log 2>&1 &
          sleep 20

      - name: Build App
        run: |
          xcodebuild \
          -scheme SwiftUIDemoAllComponents \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

      - name: Run Appium Tests
        run: |
          cd AppiumTests
          mvn clean test

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
