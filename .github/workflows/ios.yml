name: iOS Appium Automation - CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  appium-ios:
    runs-on: macos-15

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium driver list --installed

      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type d
          find . -name "pom.xml"

      - name: Show Simulators
        run: |
          xcrun simctl list devices available

      - name: Build iOS App
        run: |
          xcodebuild \
            -scheme SwiftUIDemoAllComponents \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build

          echo "Find generated .app"
          find build -name "*.app"

      - name: Boot Available iPhone Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep -E "iPhone.*\(" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "DEVICE_ID=$DEVICE_ID"

          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Check Bundle ID
        run: |
          APP_PATH=$(find build -name "SwiftUIDemoAllComponents.app" | head -1)
          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "App file not found"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist"

      - name: Install App on Simulator
        run: |
          APP_PATH=$(find build -name "SwiftUIDemoAllComponents.app" | head -1)
          echo "APP_PATH=$APP_PATH"
          echo "DEVICE_ID=$DEVICE_ID"

          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          echo "Installed Apps:"
          xcrun simctl listapps "$DEVICE_ID" | grep "test.com.SwiftUIDemoAllComponents" || true

          xcrun simctl launch "$DEVICE_ID" test.com.SwiftUIDemoAllComponents || true

      - name: Create Report Folders
        run: |
          mkdir -p AppiumTests/allure-results
          mkdir -p AppiumTests/screenshots

      - name: Start Appium Server
        run: |
          nohup appium --base-path / > appium.log 2>&1 &
          sleep 20
          cat appium.log

      - name: Run Appium Tests
        run: |
          cd AppiumTests
          mvn clean test -DbundleId=test.com.SwiftUIDemoAllComponents

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: AppiumTests/allure-results
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: AppiumTests/screenshots
          if-no-files-found: ignore

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore
